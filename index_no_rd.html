<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synology ActiveProtect 備份規劃建議書 (精簡經濟版)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&family=Noto+Sans+TC:wght=300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', 'Noto Sans TC', sans-serif;
    }
    .gradient-bg {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    }
    .card-shadow {
      box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05), 0 2px 8px -1px rgba(0, 0, 0, 0.03);
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen flex flex-col">

  <header class="gradient-bg text-white py-12 px-6 shadow-lg border-b border-slate-700">
    <div class="max-w-6xl mx-auto flex flex-col md:flex-row md:items-center md:justify-between gap-6">
      <div>
        <div class="inline-flex items-center gap-2 bg-emerald-500/20 border border-emerald-500/30 text-emerald-400 px-3 py-1 rounded-full text-xs font-semibold uppercase tracking-wider mb-3">
          ActiveProtect 方案評估 (精簡無RD版)
        </div>
        <h1 class="text-3xl md:text-4xl font-black tracking-tight text-white mb-2">
          Synology 備份系統規劃建議書
        </h1>
        <p class="text-slate-300 max-w-2xl text-sm md:text-base">
          針對實體機、VM、M365 與一般 File Server，評估高性價比 DP340 桌上型一體機之承載能力與 3 天不可變安全防禦。
        </p>
      </div>
      <div class="bg-slate-800/80 border border-slate-700 p-4 rounded-xl text-right md:min-w-[240px]">
        <div class="text-xs text-slate-400">專案評估對象</div>
        <div class="text-lg font-bold text-white mb-1">資訊部門 / 決策主管</div>
        <div class="text-xs text-slate-400">推薦機型：<span class="text-emerald-400 font-semibold">DP340 (最佳性價比)</span></div>
      </div>
    </div>
  </header>

  <div class="bg-white border-b border-slate-200 sticky top-0 z-40 shadow-sm">
    <div class="max-w-6xl mx-auto px-6 overflow-x-auto flex gap-6">
      <button onclick="switchTab('overview')" id="tab-overview" class="py-4 px-1 text-sm font-semibold border-b-2 border-blue-600 text-blue-600 whitespace-nowrap focus:outline-none transition-all">
        1. 項目摘要與推薦設備
      </button>
      <button onclick="switchTab('capacity')" id="tab-capacity" class="py-4 px-1 text-sm font-semibold border-b-2 border-transparent text-slate-500 hover:text-slate-800 whitespace-nowrap focus:outline-none transition-all">
        2. 備份源容量精算表
      </button>
      <button onclick="switchTab('retention')" id="tab-retention" class="py-4 px-1 text-sm font-semibold border-b-2 border-transparent text-slate-500 hover:text-slate-800 whitespace-nowrap focus:outline-none transition-all">
        3. 7天備份與3天防篡改機制
      </button>
      <button onclick="switchTab('calculator')" id="tab-calculator" class="py-4 px-1 text-sm font-semibold border-b-2 border-transparent text-slate-500 hover:text-slate-800 whitespace-nowrap focus:outline-none transition-all flex items-center gap-1">
        4. 備份容量動態模擬器 <span class="bg-blue-100 text-blue-800 text-[10px] px-1.5 py-0.5 rounded-full">互動</span>
      </button>
    </div>
  </div>

  <main class="flex-grow max-w-6xl w-full mx-auto p-6">
    
    <section id="sec-overview" class="space-y-6">

        <div class="flex items-start gap-3">
          <div class="p-1.5 bg-emerald-100 text-emerald-600 rounded-lg">
